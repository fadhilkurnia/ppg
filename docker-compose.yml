services:
  app:
    build: .
    image: ppg-dashboard:latest
    container_name: ppg-dashboard
    ports:
      # Bind to loopback only — external access goes through the cloudflared
      # sidecar (which reaches the app over the compose network, not the host).
      - "127.0.0.1:${PORT:-8080}:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-24h}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      DATABASE_PATH: /app/data/app.db
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    volumes:
      - ${DATA_VOLUME:-ppg-data}:/app/data
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ppg-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    # Share the host network so the dashboard's `http://localhost:8080`
    # ingress reaches the app bound at 127.0.0.1:8080 on the host.
    network_mode: host
    depends_on:
      - app
    restart: unless-stopped
    profiles: ["tunnel"]

volumes:
  ${DATA_VOLUME:-ppg-data}:
